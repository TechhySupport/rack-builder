<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 24" fill="none">
  <rect width="48" height="24" rx="3" fill="#1a2e1a"/>
  <!-- battery body -->
  <rect x="4" y="5" width="32" height="14" rx="2" fill="#22432a"/>
  <!-- battery fill -->
  <rect x="6" y="7" width="24" height="10" rx="1" fill="#4ade80"/>
  <!-- battery level % -->
  <rect x="6" y="7" width="18" height="10" rx="1" fill="#16a34a"/>
  <!-- battery terminal -->
  <rect x="36" y="9" width="4" height="6" rx="1" fill="#22432a"/>
  <!-- bolt symbol -->
  <text x="37" y="18" font-family="system-ui" font-size="9" fill="#bbf7d0" font-weight="bold">UPS</text>
  <!-- status LEDs -->
  <circle cx="42" cy="7"  r="1.5" fill="#4ade80"/>
  <circle cx="42" cy="11" r="1.5" fill="#fbbf24"/>
</svg>
