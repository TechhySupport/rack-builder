<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 24" fill="none">
  <rect width="48" height="24" rx="3" fill="#3b1f10"/>
  <!-- 25-pair cable bundle -->
  <rect x="4" y="10" width="40" height="4" rx="1" fill="#92400e"/>
  <!-- pair lines -->
  <line x1="8"  y1="10" x2="8"  y2="14" stroke="#fbbf24" stroke-width="0.5"/>
  <line x1="11" y1="10" x2="11" y2="14" stroke="#f97316" stroke-width="0.5"/>
  <line x1="14" y1="10" x2="14" y2="14" stroke="#fbbf24" stroke-width="0.5"/>
  <line x1="17" y1="10" x2="17" y2="14" stroke="#f97316" stroke-width="0.5"/>
  <line x1="20" y1="10" x2="20" y2="14" stroke="#fbbf24" stroke-width="0.5"/>
  <line x1="23" y1="10" x2="23" y2="14" stroke="#f97316" stroke-width="0.5"/>
  <line x1="26" y1="10" x2="26" y2="14" stroke="#fbbf24" stroke-width="0.5"/>
  <line x1="29" y1="10" x2="29" y2="14" stroke="#f97316" stroke-width="0.5"/>
  <line x1="32" y1="10" x2="32" y2="14" stroke="#fbbf24" stroke-width="0.5"/>
  <line x1="35" y1="10" x2="35" y2="14" stroke="#f97316" stroke-width="0.5"/>
  <line x1="38" y1="10" x2="38" y2="14" stroke="#fbbf24" stroke-width="0.5"/>
  <!-- connectors -->
  <rect x="2"  y="9"  width="4" height="6" rx="1" fill="#7c3303"/>
  <rect x="42" y="9"  width="4" height="6" rx="1" fill="#7c3303"/>
</svg>
